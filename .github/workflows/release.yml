name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: seekit

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: ""

    steps:
      - uses: actions/checkout@v7

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ matrix.target }}

      - name: Install cross-compilation dependencies (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build (release)
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../$BINARY_NAME-${{ matrix.target }}.tar.gz $BINARY_NAME${{ matrix.suffix }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: $BINARY_NAME-${{ matrix.target }}.tar.gz

  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Generate release body
        run: |
          cat > release-body.md << 'EOF'
          ## Installation

          ### Quick install (Linux / macOS)
          ```bash
          curl -fsSL https://raw.githubusercontent.com/noisystreet/seekit/main/install.sh | sh
          ```

          ### Homebrew
          ```bash
          brew install noisystreet/tap/seekit
          ```

          ### Cargo
          ```bash
          cargo install seekit
          ```

          ### Manual
          Download the archive for your platform below, extract and place `seekit` in your `PATH`.
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-body.md
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
